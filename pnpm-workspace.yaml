packages:
  - 'apps/*'
  - 'packages/*'
  - 'tools/*'

# pnpm 11 build-script approval. Listing a dependency here with `true`
# means its install/postinstall scripts are allowed to run; anything not
# listed is treated as unreviewed and (with `strictDepBuilds: true`, the
# default) hard-fails `pnpm install` in CI.
allowBuilds:
  esbuild: true
  sharp: true
