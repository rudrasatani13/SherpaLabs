name: aimcp-lint
description: Lint your MCP server for protocol compliance, schema violations, security issues, and performance best practices.

branding:
  icon: check-circle
  color: blue

inputs:
  server-command:
    description: "Command to start your MCP server (e.g., 'node ./server.mjs')"
    required: true
  min-score:
    description: 'Minimum score required to pass (0-100)'
    required: false
    default: '80'
  format:
    description: 'Rendering format for step summary/comment output (terminal, json, or markdown). CLI execution always uses JSON quiet internally.'
    required: false
    default: 'terminal'
  config:
    description: 'Path to .aimcp-lint.json config file'
    required: false
  working-directory:
    description: 'Working directory for the lint run'
    required: false
    default: '.'
  post-comment:
    description: 'Post or update a PR comment with lint results (only works on pull_request events)'
    required: false
    default: 'true'
  verbose:
    description: 'Enable verbose diagnostics'
    required: false
    default: 'false'

outputs:
  score:
    description: 'Lint score achieved'
    value: ${{ steps.lint.outputs.score }}
  max-score:
    description: 'Maximum possible score'
    value: ${{ steps.lint.outputs.max_score }}
  passed:
    description: 'Whether the lint threshold was met'
    value: ${{ steps.lint.outputs.passed }}
  report-path:
    description: 'Path to the JSON lint result file'
    value: ${{ steps.lint.outputs.report_path }}

runs:
  using: composite
  steps:
    - name: Run aimcp-lint
      id: lint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        AIMCP_RESULT_FILE: ${{ runner.temp }}/aimcp-lint-result.json
        AIMCP_SUMMARY_FILE: ${{ runner.temp }}/aimcp-lint-summary.md
        AIMCP_COMMENT_FILE: ${{ runner.temp }}/aimcp-lint-comment.md
        AIMCP_ACTION_FORMAT: ${{ inputs.format }}
        AIMCP_CONFIG: ${{ inputs.config }}
        AIMCP_MIN_SCORE: ${{ inputs.min-score }}
        AIMCP_SERVER_COMMAND: ${{ inputs.server-command }}
        AIMCP_VERBOSE: ${{ inputs.verbose }}
      run: |
        case "$AIMCP_ACTION_FORMAT" in
          terminal|json|markdown)
            ;;
          *)
            echo "::error::format must be terminal, json, or markdown"
            exit 2
            ;;
        esac

        CONFIG_FLAG=()
        if [ -n "$AIMCP_CONFIG" ]; then
          CONFIG_FLAG=(--config "$AIMCP_CONFIG")
        fi

        VERBOSE_FLAG=()
        if [ "$AIMCP_VERBOSE" = "true" ]; then
          VERBOSE_FLAG=(--verbose)
        fi

        set +e
        npx @sherpa-labs/aimcp-lint \
          --format json --quiet \
          --fail-under "$AIMCP_MIN_SCORE" \
          "${CONFIG_FLAG[@]}" \
          "${VERBOSE_FLAG[@]}" \
          -- ${{ inputs.server-command }} > "$AIMCP_RESULT_FILE" 2>/dev/null
        EXIT_CODE=$?
        set -e

        SCORE=$(node -e "try { const r=JSON.parse(require('fs').readFileSync('$AIMCP_RESULT_FILE','utf8')); process.stdout.write(String(r.score)) } catch { process.stdout.write('0') }")
        MAX_SCORE=$(node -e "try { const r=JSON.parse(require('fs').readFileSync('$AIMCP_RESULT_FILE','utf8')); process.stdout.write(String(r.max_score)) } catch { process.stdout.write('100') }")
        PASSED=$(node -e "try { const r=JSON.parse(require('fs').readFileSync('$AIMCP_RESULT_FILE','utf8')); process.stdout.write(r.passed?'true':'false') } catch { process.stdout.write('false') }")

        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "max_score=$MAX_SCORE" >> "$GITHUB_OUTPUT"
        echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
        echo "report_path=$AIMCP_RESULT_FILE" >> "$GITHUB_OUTPUT"

        node - "$AIMCP_RESULT_FILE" "$AIMCP_ACTION_FORMAT" "$AIMCP_SUMMARY_FILE" "$AIMCP_COMMENT_FILE" "$AIMCP_MIN_SCORE" "$AIMCP_SERVER_COMMAND" <<'NODE'
        const fs = require('node:fs');

        const [, , resultPath, actionFormat, summaryPath, commentPath, minScore, serverCommand] =
          process.argv;
        let raw = '';
        let report = { score: 0, max_score: 100, passed: false };

        try {
          raw = fs.readFileSync(resultPath, 'utf8');
          report = JSON.parse(raw);
        } catch {
          raw = JSON.stringify(report, null, 2);
        }

        const score = report.score ?? 0;
        const maxScore = report.max_score ?? 100;
        const passed = report.passed === true;
        const result = passed ? 'PASS' : 'FAIL';
        const summary = report.summary ?? {};
        const categories = report.category_subscores ?? {};
        const violations = Array.isArray(report.violations) ? report.violations : [];

        function escapeMarkdown(value) {
          return String(value).replaceAll('|', '\\|').replaceAll('\n', ' ');
        }

        function renderJson() {
          return [
            '## aimcp-lint JSON Report',
            '',
            '```json',
            raw.trim(),
            '```',
            '',
          ].join('\n');
        }

        function renderTerminal() {
          return [
            '## aimcp-lint Results',
            '',
            '| Metric | Value |',
            '|--------|-------|',
            `| Score | \`${score}/${maxScore}\` |`,
            `| Threshold | \`${minScore}\` |`,
            `| Result | ${result} |`,
            `| Server Command | \`${escapeMarkdown(serverCommand)}\` |`,
            '',
            '<details><summary>JSON Report</summary>',
            '',
            '```json',
            raw.trim(),
            '```',
            '',
            '</details>',
            '',
          ].join('\n');
        }

        function renderMarkdown() {
          const lines = [
            '## aimcp-lint Report',
            '',
            `**Result:** ${result}`,
            '',
            '| Metric | Value |',
            '|--------|-------|',
            `| Score | \`${score}/${maxScore}\` |`,
            `| Threshold | \`${minScore}\` |`,
            `| Violations | \`${summary.violation_count ?? violations.length}\` |`,
            `| Errors | \`${summary.error_count ?? 0}\` |`,
            `| Warnings | \`${summary.warning_count ?? 0}\` |`,
            `| Info | \`${summary.info_count ?? 0}\` |`,
            `| Server Command | \`${escapeMarkdown(serverCommand)}\` |`,
            '',
          ];

          if (Object.keys(categories).length > 0) {
            lines.push('### Category Subscores', '', '| Category | Score |', '|----------|-------|');
            for (const [category, value] of Object.entries(categories)) {
              lines.push(`| ${escapeMarkdown(category)} | \`${escapeMarkdown(value)}\` |`);
            }
            lines.push('');
          }

          if (violations.length > 0) {
            lines.push('### Violations', '', '| Rule | Severity | Message |', '|------|----------|---------|');
            for (const violation of violations.slice(0, 10)) {
              lines.push(
                `| ${escapeMarkdown(violation.rule_id ?? '')} | ${escapeMarkdown(
                  violation.severity ?? '',
                )} | ${escapeMarkdown(violation.message ?? '')} |`,
              );
            }
            if (violations.length > 10) {
              lines.push(`| ... | ... | ${violations.length - 10} more violations in JSON report |`);
            }
            lines.push('');
          }

          lines.push(
            '<details><summary>JSON Report</summary>',
            '',
            '```json',
            raw.trim(),
            '```',
            '',
            '</details>',
            '',
          );

          return lines.join('\n');
        }

        const body =
          actionFormat === 'json'
            ? renderJson()
            : actionFormat === 'markdown'
              ? renderMarkdown()
              : renderTerminal();

        fs.writeFileSync(summaryPath, body);
        fs.writeFileSync(commentPath, `<!-- aimcp-lint-report -->\n${body}`);
        NODE

        cat "$AIMCP_SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

        if [ "$PASSED" != "true" ]; then
          echo "::error::aimcp-lint score ${SCORE}/${MAX_SCORE} is below threshold ($AIMCP_MIN_SCORE)"
          exit 1
        fi

    - name: Post PR comment
      if: ${{ always() && inputs.post-comment == 'true' && github.event_name == 'pull_request' && steps.lint.outputs.report_path != '' }}
      uses: actions/github-script@v7
      env:
        AIMCP_COMMENT_FILE: ${{ runner.temp }}/aimcp-lint-comment.md
      with:
        github-token: ${{ github.token }}
        script: |
          const fs = require('node:fs');

          const marker = '<!-- aimcp-lint-report -->';
          const body = fs.readFileSync(process.env.AIMCP_COMMENT_FILE, 'utf8');

          const { data: comments } = await github.rest.issues.listComments({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
          });

          const botComment = comments.find(c => c.body?.includes(marker));
          if (botComment) {
            await github.rest.issues.updateComment({
              comment_id: botComment.id,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
          }
