name: aimcp-lint example

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - uses: rudrasatani13/aimcp-lint-action@v1
        with:
          server-command: 'node ./server.mjs'
          min-score: '80'
          format: 'terminal'
